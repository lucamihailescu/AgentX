# Enable per-user Bayes scoped by the Deliver-To header the agent sets on
# every check/learn request. Storage backend is Redis (configured in
# redis.conf). Auto-learn lets the classifier pick up on its own
# high-confidence verdicts in addition to explicit user actions.
backend = "redis";
new_schema = true;
expire = 8640000;   # 100 days
per_user = true;
autolearn = [-5, 10];
