<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ subject or '(no subject)' }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: light dark; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.55;
      color: #1a1b1e;
      background: #fff;
      padding: 1rem 1.25rem 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #eef0f3; background: #15171c; }
      .meta { border-color: rgba(255,255,255,0.08); }
      .meta .label { color: rgba(255,255,255,0.4); }
      .notice { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.55); }
    }
    .meta {
      font-size: .85rem;
      color: #5d5e62;
      padding-bottom: .75rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .meta .label {
      display: inline-block;
      width: 64px;
      color: #999;
      font-variant-numeric: tabular-nums;
    }
    .meta .row { padding: .15rem 0; }
    .notice {
      font-size: .78rem;
      color: #8a8a8e;
      background: #f5f5f7;
      padding: .55rem .75rem;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    .body { font-size: .92rem; word-wrap: break-word; overflow-wrap: anywhere; }
    .body img { display: none; } /* defense-in-depth even though CSP blocks them */
    .body table { max-width: 100% !important; height: auto !important; }
    .body pre {
      white-space: pre-wrap;
      font-family: ui-monospace, "JetBrains Mono", monospace;
      font-size: .85rem;
    }
    .empty { color: #999; font-style: italic; }
  </style>
</head>
<body>
  <div class="meta">
    <div class="row"><span class="label">From</span> {{ from_addr or '—' }}</div>
    <div class="row"><span class="label">Subject</span> {{ subject or '(no subject)' }}</div>
    <div class="row"><span class="label">Received</span> {{ received or '—' }}</div>
  </div>

  <div class="notice">
    Images, scripts, and external resources are blocked. Links are not interactive.
  </div>

  <div class="body">
    {% if html_body %}
      {{ html_body | safe }}
    {% elif text_body %}
      <pre>{{ text_body }}</pre>
    {% else %}
      <p class="empty">(empty message)</p>
    {% endif %}
  </div>
</body>
</html>
