# agentx — long-running agent for consumer Microsoft accounts (outlook.com).
# Talks to Microsoft Graph directly via MSAL; no sidecar.
#
# Fill CLIENT_ID / CLIENT_SECRET / SESSION_SECRET in .env.

services:
  agent:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Microsoft (leave blank if you only want Gmail)
      AGENT_CLIENT_ID: ${CLIENT_ID:-}
      AGENT_CLIENT_SECRET: ${CLIENT_SECRET:-}
      AGENT_AUTHORITY: ${AUTHORITY:-https://login.microsoftonline.com/consumers}
      AGENT_REDIRECT_URI: ${REDIRECT_URI:-http://localhost:8080/auth/microsoft/callback}
      # Google (leave blank if you only want Outlook)
      AGENT_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      AGENT_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AGENT_GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/auth/google/callback}
      AGENT_SESSION_SECRET: ${SESSION_SECRET}
      AGENT_CACHE_KEY: ${CACHE_KEY:-}
      AGENT_DB_PATH: /data/tasks.db
      AGENT_OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      AGENT_OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      AGENT_OLLAMA_CONCURRENCY: ${OLLAMA_CONCURRENCY:-4}
      AGENT_OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-1024}
      AGENT_OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.0}
      AGENT_OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-200}
      AGENT_OLLAMA_EXAMPLES_PER_CLASS: ${OLLAMA_EXAMPLES_PER_CLASS:-3}
      AGENT_CHAT_MODEL: ${CHAT_MODEL:-}
      AGENT_EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      AGENT_EMBED_DIMS: ${EMBED_DIMS:-768}
      AGENT_CHROMA_PATH: ${CHROMA_PATH:-/data/chroma}
      AGENT_MAX_MESSAGES_PER_AUDIT: ${MAX_MESSAGES_PER_AUDIT:-200}
      AGENT_BLOCKED_DOMAINS: ${BLOCKED_DOMAINS:-}
      AGENT_SUGGEST_BLOCK_THRESHOLD: ${SUGGEST_BLOCK_THRESHOLD:-3}
      AGENT_SUGGEST_MAX_ITEMS: ${SUGGEST_MAX_ITEMS:-5}
      AGENT_DEFAULT_SCHEDULE_INTERVAL_MINUTES: ${DEFAULT_SCHEDULE_INTERVAL_MINUTES:-}
      AGENT_SCHEDULER_TICK_SECONDS: ${SCHEDULER_TICK_SECONDS:-60}
      # Real-time polling (near-live scanning)
      AGENT_POLL_ENABLED: ${POLL_ENABLED:-true}
      AGENT_DEFAULT_POLL_INTERVAL_SECONDS: ${DEFAULT_POLL_INTERVAL_SECONDS:-}
      AGENT_POLL_MIN_INTERVAL_SECONDS: ${POLL_MIN_INTERVAL_SECONDS:-30}
      AGENT_POLL_FETCH_LIMIT: ${POLL_FETCH_LIMIT:-25}
      # Daily digest
      AGENT_DIGEST_ENABLED: ${DIGEST_ENABLED:-true}
      AGENT_DIGEST_HOUR: ${DIGEST_HOUR:-9}
      AGENT_DIGEST_TIMEZONE: ${DIGEST_TIMEZONE:-America/New_York}
      AGENT_DIGEST_WINDOW_HOURS: ${DIGEST_WINDOW_HOURS:-24}
      # Triage / categorization (write categories back as labels)
      AGENT_CATEGORIZE_ENABLED: ${CATEGORIZE_ENABLED:-true}
      AGENT_APPLY_LABELS_ENABLED: ${APPLY_LABELS_ENABLED:-true}
      AGENT_LABEL_PREFIX: ${LABEL_PREFIX:-AgentX}
      # Phishing / BEC review
      AGENT_PHISHING_ENABLED: ${PHISHING_ENABLED:-true}
      # Action layer + reply drafts (saved to Drafts, never sent)
      AGENT_EXTRACT_ACTIONS_ENABLED: ${EXTRACT_ACTIONS_ENABLED:-true}
      AGENT_DRAFTS_ENABLED: ${DRAFTS_ENABLED:-true}
      AGENT_DRAFT_MODEL: ${DRAFT_MODEL:-}
      AGENT_DRAFT_NUM_PREDICT: ${DRAFT_NUM_PREDICT:-400}
      # Semantic mailbox search
      AGENT_SEARCH_ENABLED: ${SEARCH_ENABLED:-true}
      AGENT_SEARCH_TOP_K: ${SEARCH_TOP_K:-20}
      AGENT_RSPAMD_URL: ${RSPAMD_URL:-http://rspamd:11333}
      AGENT_RSPAMD_WEIGHT: ${RSPAMD_WEIGHT:-0.6}
      AGENT_RSPAMD_TIMEOUT_SECONDS: ${RSPAMD_TIMEOUT_SECONDS:-3.0}
      AGENT_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    volumes:
      # Bind-mount to a host directory so `docker compose down -v`
      # does NOT touch the SQLite file or ChromaDB store. Both live in
      # ./data/ on the host (./data/tasks.db and ./data/chroma/).
      - ./data:/data
    depends_on:
      - rspamd

  rspamd:
    image: rspamd/rspamd:3.8
    # Per-user Bayes + Redis backend wired via mounted local.d overrides.
    # Ports kept internal — only the agent container talks to rspamd.
    expose:
      - "11333"   # normal worker (checkv2, learnspam, learnham)
    volumes:
      - ./rspamd/local.d:/etc/rspamd/local.d:ro
      - ./data/rspamd:/var/lib/rspamd
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    # Backing store for rspamd's per-user Bayes tokens. Persisted via volume.
    expose:
      - "6379"
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]

  # Cloudflare Tunnel — exposes the agent on a public hostname without
  # opening any inbound ports. Set TUNNEL_TOKEN in .env to enable; leave
  # blank to keep the agent localhost-only.
  #
  # 1. Create a named tunnel in the Cloudflare Zero Trust dashboard
  #    (Networks → Tunnels → Create a tunnel) and copy the connector
  #    token. Point the tunnel's public hostname at `http://agent:8080`.
  # 2. Add an Access policy on that hostname restricting to your email(s).
  # 3. Re-register the public callback URL in Entra + Google Cloud
  #    Console: https://<your-hostname>/auth/microsoft/callback and the
  #    Google equivalent.
  # 4. Set AGENT_PUBLIC_BASE_URL=https://<your-hostname> in .env so the
  #    OAuth flows use it.
  #
  # Only runs when TUNNEL_TOKEN is non-empty (otherwise this service
  # exits immediately, which is harmless).
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN:-}"]
    depends_on:
      - agent
    profiles:
      - tunnel
