# agentx — long-running agent for consumer Microsoft accounts (outlook.com).
# Talks to Microsoft Graph directly via MSAL; no sidecar.
#
# Fill CLIENT_ID / CLIENT_SECRET / SESSION_SECRET in .env.

services:
  agent:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Microsoft (leave blank if you only want Gmail)
      AGENT_CLIENT_ID: ${CLIENT_ID:-}
      AGENT_CLIENT_SECRET: ${CLIENT_SECRET:-}
      AGENT_AUTHORITY: ${AUTHORITY:-https://login.microsoftonline.com/consumers}
      AGENT_REDIRECT_URI: ${REDIRECT_URI:-http://localhost:8080/auth/microsoft/callback}
      # Google (leave blank if you only want Outlook)
      AGENT_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      AGENT_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AGENT_GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/auth/google/callback}
      AGENT_SESSION_SECRET: ${SESSION_SECRET}
      AGENT_CACHE_KEY: ${CACHE_KEY:-}
      AGENT_DB_PATH: /data/tasks.db
      AGENT_OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      AGENT_OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      AGENT_OLLAMA_CONCURRENCY: ${OLLAMA_CONCURRENCY:-4}
      AGENT_OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-1024}
      AGENT_OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.0}
      AGENT_OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-200}
      AGENT_OLLAMA_EXAMPLES_PER_CLASS: ${OLLAMA_EXAMPLES_PER_CLASS:-3}
      AGENT_CHAT_MODEL: ${CHAT_MODEL:-}
      AGENT_EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      AGENT_EMBED_DIMS: ${EMBED_DIMS:-768}
      AGENT_QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      AGENT_QDRANT_PORT: ${QDRANT_PORT:-6333}
      AGENT_MAX_MESSAGES_PER_AUDIT: ${MAX_MESSAGES_PER_AUDIT:-200}
      AGENT_BLOCKED_DOMAINS: ${BLOCKED_DOMAINS:-}
      AGENT_SUGGEST_BLOCK_THRESHOLD: ${SUGGEST_BLOCK_THRESHOLD:-3}
      AGENT_SUGGEST_MAX_ITEMS: ${SUGGEST_MAX_ITEMS:-5}
      AGENT_DEFAULT_SCHEDULE_INTERVAL_MINUTES: ${DEFAULT_SCHEDULE_INTERVAL_MINUTES:-}
      AGENT_SCHEDULER_TICK_SECONDS: ${SCHEDULER_TICK_SECONDS:-60}
    volumes:
      # Bind-mount to a host directory so `docker compose down -v`
      # does NOT touch the SQLite file. Data lives in ./data/ on the host.
      - ./data:/data
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.12.1
    volumes:
      - ./qdrant-data:/qdrant/storage
    # Not exposed on the host — only the agent container needs it.
    expose:
      - "6333"

volumes:
  qdrant-data:
